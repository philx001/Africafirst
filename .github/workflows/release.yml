name: Release

# Déclenché sur un tag vX.Y.Z (ex: v1.0.0, v1.2.3-rc1)
on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository }}-api
  IMAGE_WEB: ${{ github.repository }}-web

jobs:
  # ============================================================
  # 1. Vérification qualité (identique au CI principal)
  # ============================================================
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Shared
        run: npm run build -w @crm/shared

      - name: Typecheck API
        run: npm exec -w @crm/api -- tsc --noEmit

      - name: Typecheck Web
        run: npm exec -w @crm/web -- tsc --noEmit

      - name: Lint API
        run: npm run lint -w @crm/api

      - name: Lint Web
        run: npm run lint -w @crm/web

      - name: Tests API
        run: npm run test -w @crm/api -- --runInBand

  # ============================================================
  # 2. Migrations base de données
  # ============================================================
  migrate:
    name: Database migrations
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}

      - name: Deploy migrations
        run: npm run db:migrate
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}

  # ============================================================
  # 3. Build et push des images Docker
  # ============================================================
  docker:
    name: Build & push Docker images
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_API }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Docker meta — Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ============================================================
  # 4. Déploiement (adapter selon la plateforme cible)
  # ============================================================
  # Décommenter et adapter le bloc correspondant à votre hébergeur.

  # --- Option A : Railway ---
  # deploy-railway:
  #   name: Deploy to Railway
  #   needs: docker
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Deploy API
  #       run: |
  #         curl -fsSL https://railway.app/install.sh | sh
  #         railway up --service api --detach
  #       env:
  #         RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # --- Option B : Render ---
  # deploy-render:
  #   name: Deploy to Render
  #   needs: docker
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Trigger Render deploy hook (API)
  #       run: curl -fsSL "${{ secrets.RENDER_DEPLOY_HOOK_API }}"
  #     - name: Trigger Render deploy hook (Web)
  #       run: curl -fsSL "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}"

  # --- Option C : VPS via SSH ---
  # deploy-vps:
  #   name: Deploy to VPS
  #   needs: docker
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: SSH deploy
  #       uses: appleboy/ssh-action@v1
  #       with:
  #         host: ${{ secrets.VPS_HOST }}
  #         username: ${{ secrets.VPS_USER }}
  #         key: ${{ secrets.VPS_SSH_KEY }}
  #         script: |
  #           cd /srv/crm-africafirst
  #           docker compose -f docker-compose.prod.yml pull
  #           docker compose -f docker-compose.prod.yml up -d --remove-orphans
  #           docker system prune -f

  # ============================================================
  # 5. Création de la GitHub Release
  # ============================================================
  github-release:
    name: Create GitHub Release
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
